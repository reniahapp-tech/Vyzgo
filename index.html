  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Vitrine digital profissional para pequenos negócios" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Vitrine App" />
    <title>VyzGo</title>
    <!-- Plausible Analytics (dados de visitas sem cookies) -->
    <script defer data-domain="" src="https://plausible.io/js/script.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['DM Sans', 'sans-serif'],
            },
            colors: {
              cream: '#FDFBF7',
              terracotta: '#C27B63',
              sage: '#8DA893',
              'sage-light': '#DCE6DF', // Lighter version for backgrounds
              'sage-dark': '#6B8270',  // Darker version for contrast
              beige: '#F4F1EA',
              dark: '#1A2E22',
            },
            borderRadius: {
              'xl2': '24px',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #FDFBF7;
        overflow-x: hidden;
        width: 100%;
      }
      
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      @keyframes slideUpPanel {
        from {
          transform: translateY(100%);
        }
        to {
          transform: translateY(0);
        }
      }

      .animate-fade-in {
        animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0; /* Start hidden */
      }

      .animate-slide-up-panel {
        animation: slideUpPanel 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
    </style>
